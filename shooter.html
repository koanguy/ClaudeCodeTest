<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP GUN - Top-Down Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameCanvas {
    display: block;
    cursor: none;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// =============================================================================
// CONSTANTS & CONFIG
// =============================================================================
const CANVAS_W = 800;
const CANVAS_H = 600;
const COLORS = {
  BG: '#111',
  GRID: '#1a1a1a',
  WHITE: '#ffffff',
  CYAN: '#00ffff',
  RED: '#ff2222',
  ORANGE: '#ff8800',
  YELLOW: '#ffee00',
  PURPLE: '#cc44ff',
  GREEN: '#00ff88',
  DARK: '#222',
  GREY: '#888',
  HEART: '#ff4455',
};

const STATES = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3 };

const ENEMY_TYPES = {
  GRUNT:   { color: COLORS.RED,    speed: 60,  hp: 1, size: 14, score: 10, label: 'GRUNT' },
  RUNNER:  { color: COLORS.ORANGE, speed: 110, hp: 1, size: 11, score: 15, label: 'RUNNER' },
  TANK:    { color: COLORS.PURPLE, speed: 40,  hp: 3, size: 20, score: 30, label: 'TANK' },
  SHOOTER: { color: COLORS.YELLOW, speed: 70,  hp: 1, size: 13, score: 25, label: 'SHOOTER' },
};

const LEVELS = [
  { waves: 2, counts: [5, 6],         types: ['GRUNT'] },
  { waves: 3, counts: [6, 7, 8],      types: ['GRUNT','RUNNER'] },
  { waves: 3, counts: [8, 9, 10],     types: ['GRUNT','RUNNER','TANK'] },
  { waves: 4, counts: [10, 11, 12, 11], types: ['GRUNT','RUNNER','TANK','SHOOTER'] },
  { waves: 5, counts: [12, 13, 14, 14, 15], types: ['GRUNT','RUNNER','TANK','SHOOTER'] },
];

// =============================================================================
// CANVAS SETUP
// =============================================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;
ctx.imageSmoothingEnabled = false;

// =============================================================================
// STATE MANAGEMENT
// =============================================================================
let gameState = STATES.MENU;
let score = 0;
let highScore = 0;
let currentLevel = 0;
let currentWave = 0;
let enemiesKilled = 0;
let waveMessage = '';
let waveMessageTimer = 0;
let levelCompleteTimer = 0;
let gameOverTimer = 0;
let screenShake = 0;
let screenFlash = 0;
let lastTime = 0;

// =============================================================================
// INPUT HANDLER
// =============================================================================
const keys = {};
const mouse = { x: CANVAS_W / 2, y: CANVAS_H / 2, clicked: false };

document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key) && e.preventDefault(); });
document.addEventListener('keyup',  e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / r.width;
  const scaleY = CANVAS_H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top) * scaleY;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.clicked = true; });

// =============================================================================
// UTILITY
// =============================================================================
function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy);
}
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

// =============================================================================
// PARTICLE CLASS
// =============================================================================
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = rand(-120, 120);
    this.vy = rand(-120, 120);
    this.size = randInt(3, 7);
    this.life = 1.0;
    this.decay = rand(1.5, 3.0);
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.life -= this.decay * dt;
  }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.fillRect(Math.round(this.x - this.size/2), Math.round(this.y - this.size/2), this.size, this.size);
    ctx.globalAlpha = 1;
  }
  isDead() { return this.life <= 0; }
}

let particles = [];
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

// =============================================================================
// BULLET CLASS
// =============================================================================
class Bullet {
  constructor(x, y, angle, speed, color, radius, fromEnemy) {
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color;
    this.radius = radius;
    this.fromEnemy = fromEnemy || false;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.x < -20 || this.x > CANVAS_W + 20 || this.y < -20 || this.y > CANVAS_H + 20) {
      this.dead = true;
    }
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(Math.round(this.x), Math.round(this.y), this.radius, 0, Math.PI * 2);
    ctx.fill();
    // trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(Math.round(this.x - this.vx * 0.04), Math.round(this.y - this.vy * 0.04), this.radius * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let bullets = [];
let enemyBullets = [];

// =============================================================================
// ENEMY CLASS
// =============================================================================
class Enemy {
  constructor(x, y, typeName) {
    const cfg = ENEMY_TYPES[typeName];
    this.x = x; this.y = y;
    this.typeName = typeName;
    this.color = cfg.color;
    this.speed = cfg.speed;
    this.hp = cfg.hp;
    this.maxHp = cfg.hp;
    this.size = cfg.size;
    this.score = cfg.score;
    this.dead = false;
    this.flashTimer = 0;
    this.angle = 0;
    this.shootCooldown = 0;
    this.shootRange = 200;
    this.zigzagTimer = 0;
    this.zigzagDir = 1;
    this.walkAnim = 0;
  }

  update(dt, px, py) {
    if (this.dead) return;

    this.flashTimer = Math.max(0, this.flashTimer - dt);
    this.walkAnim += dt * 8;
    const dx = px - this.x, dy = py - this.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    this.angle = Math.atan2(dy, dx);

    if (this.typeName === 'RUNNER') {
      this.zigzagTimer += dt;
      if (this.zigzagTimer > 0.4) { this.zigzagDir *= -1; this.zigzagTimer = 0; }
      const perpX = -dy / d, perpY = dx / d;
      this.x += (dx / d * this.speed + perpX * this.speed * 0.5 * this.zigzagDir) * dt;
      this.y += (dy / d * this.speed + perpY * this.speed * 0.5 * this.zigzagDir) * dt;
    } else if (this.typeName === 'SHOOTER') {
      this.shootCooldown -= dt;
      if (d > this.shootRange) {
        this.x += dx / d * this.speed * dt;
        this.y += dy / d * this.speed * dt;
      } else {
        // stop and shoot
        if (this.shootCooldown <= 0) {
          this.shootCooldown = 2.0;
          const angle = Math.atan2(dy, dx);
          enemyBullets.push(new Bullet(this.x, this.y, angle, 200, COLORS.RED, 4, true));
        }
      }
    } else {
      this.x += dx / d * this.speed * dt;
      this.y += dy / d * this.speed * dt;
    }
  }

  takeDamage(dmg) {
    this.hp -= dmg;
    this.flashTimer = 0.12;
    if (this.hp <= 0) {
      this.dead = true;
      spawnParticles(this.x, this.y, this.color, 6);
      score += this.score;
      enemiesKilled++;
    }
  }

  draw() {
    const s = this.size;
    const flash = this.flashTimer > 0;
    const col = flash ? COLORS.WHITE : this.color;

    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    ctx.rotate(this.angle + Math.PI / 2);

    // Body
    ctx.fillStyle = col;
    ctx.fillRect(-s/2, -s/2, s, s);

    // HP bar for tanks
    if (this.typeName === 'TANK' && this.hp < this.maxHp) {
      ctx.restore();
      ctx.save();
      ctx.translate(Math.round(this.x), Math.round(this.y));
      const bw = s * 1.5;
      ctx.fillStyle = '#333';
      ctx.fillRect(-bw/2, -s/2 - 8, bw, 4);
      ctx.fillStyle = COLORS.GREEN;
      ctx.fillRect(-bw/2, -s/2 - 8, bw * (this.hp / this.maxHp), 4);
    }

    // Legs (walk bob)
    if (this.typeName !== 'TANK') {
      const bob = Math.sin(this.walkAnim) * 2;
      ctx.restore();
      ctx.save();
      ctx.translate(Math.round(this.x), Math.round(this.y));
      ctx.rotate(this.angle + Math.PI / 2);
      ctx.fillStyle = flash ? COLORS.WHITE : '#555';
      ctx.fillRect(-s/2 - 3, s/4 + bob, 3, s/3);
      ctx.fillRect(s/2,     s/4 - bob, 3, s/3);
    }

    ctx.restore();
  }
}

let enemies = [];

// =============================================================================
// PLAYER CLASS
// =============================================================================
class Player {
  constructor() {
    this.x = CANVAS_W / 2;
    this.y = CANVAS_H / 2;
    this.speed = 180;
    this.radius = 14;
    this.hp = 3;
    this.maxHp = 3;
    this.shootCooldown = 0;
    this.invincible = 0;
    this.flashTimer = 0;
    this.muzzleFlash = 0;
    this.walkAnim = 0;
    this.moving = false;
    this.angle = 0;
  }

  update(dt) {
    let vx = 0, vy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) vx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) vx += 1;
    if (keys['ArrowUp']    || keys['KeyW']) vy -= 1;
    if (keys['ArrowDown']  || keys['KeyS']) vy += 1;

    const len = Math.sqrt(vx*vx + vy*vy);
    if (len > 0) { vx /= len; vy /= len; }
    this.moving = len > 0;

    this.x = Math.max(this.radius, Math.min(CANVAS_W - this.radius, this.x + vx * this.speed * dt));
    this.y = Math.max(this.radius, Math.min(CANVAS_H - this.radius, this.y + vy * this.speed * dt));

    if (this.moving) this.walkAnim += dt * 10;

    this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
    this.shootCooldown = Math.max(0, this.shootCooldown - dt);
    this.invincible = Math.max(0, this.invincible - dt);
    this.flashTimer = Math.max(0, this.flashTimer - dt);
    this.muzzleFlash = Math.max(0, this.muzzleFlash - dt);

    if (mouse.clicked && this.shootCooldown <= 0) {
      this.shoot();
    }
  }

  shoot() {
    this.shootCooldown = 0.18;
    const gunX = this.x + Math.cos(this.angle) * 18;
    const gunY = this.y + Math.sin(this.angle) * 18;
    bullets.push(new Bullet(gunX, gunY, this.angle, 520, COLORS.CYAN, 4, false));
    this.muzzleFlash = 0.08;
  }

  takeDamage() {
    if (this.invincible > 0) return;
    this.hp--;
    this.invincible = 1.0;
    this.flashTimer = 0.15;
    screenShake = 0.25;
    screenFlash = 0.3;
    spawnParticles(this.x, this.y, COLORS.RED, 4);
  }

  draw() {
    const a = this.angle;
    const flash = this.flashTimer > 0 || (this.invincible > 0 && Math.floor(this.invincible * 8) % 2 === 0);
    if (this.invincible > 0 && Math.floor(this.invincible * 10) % 2 === 0) return; // blink

    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    ctx.rotate(a + Math.PI / 2);

    // Legs
    const legBob = Math.sin(this.walkAnim);
    ctx.fillStyle = flash ? COLORS.WHITE : '#447';
    if (this.moving) {
      ctx.fillRect(-7, 4,  5, 8 + legBob * 3);
      ctx.fillRect(2,  4,  5, 8 - legBob * 3);
    } else {
      ctx.fillRect(-7, 4, 5, 8);
      ctx.fillRect(2,  4, 5, 8);
    }

    // Body
    ctx.fillStyle = flash ? COLORS.WHITE : '#5588ff';
    ctx.fillRect(-8, -10, 16, 18);

    // Head
    ctx.fillStyle = flash ? COLORS.WHITE : '#aac4ff';
    ctx.beginPath();
    ctx.arc(0, -12, 8, 0, Math.PI * 2);
    ctx.fill();

    // Gun
    ctx.fillStyle = flash ? COLORS.WHITE : '#cccccc';
    ctx.fillRect(-3, -8, 6, 20);

    // Muzzle flash
    if (this.muzzleFlash > 0) {
      ctx.fillStyle = '#ffffaa';
      ctx.beginPath();
      ctx.arc(0, 14, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

let player = null;

// =============================================================================
// LEVEL MANAGER
// =============================================================================
let levelDef = null;

function startGame() {
  score = 0;
  enemiesKilled = 0;
  currentLevel = 0;
  currentWave = 0;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  player = new Player();
  gameState = STATES.PLAYING;
  levelDef = LEVELS[currentLevel];
  spawnWave();
}

function spawnWave() {
  const ld = LEVELS[currentLevel];
  const count = ld.counts[currentWave];
  const types = ld.types;
  // Level 5: faster enemies
  const speedMult = currentLevel === 4 ? 1.35 : 1;

  for (let i = 0; i < count; i++) {
    const typeName = types[Math.floor(Math.random() * types.length)];
    const { x, y } = randomEdgePos();
    const e = new Enemy(x, y, typeName);
    e.speed *= speedMult;
    enemies.push(e);
  }

  waveMessage = `WAVE ${currentWave + 1} / ${ld.waves}`;
  waveMessageTimer = 1.8;
}

function randomEdgePos() {
  const side = randInt(0, 3);
  if (side === 0) return { x: rand(0, CANVAS_W), y: -30 };
  if (side === 1) return { x: CANVAS_W + 30, y: rand(0, CANVAS_H) };
  if (side === 2) return { x: rand(0, CANVAS_W), y: CANVAS_H + 30 };
  return { x: -30, y: rand(0, CANVAS_H) };
}

function checkWaveComplete() {
  if (enemies.every(e => e.dead)) {
    enemies = [];
    currentWave++;
    const ld = LEVELS[currentLevel];
    if (currentWave >= ld.waves) {
      // Level complete
      if (currentLevel >= LEVELS.length - 1) {
        // Won the game! Treat as game over with win state
        if (score > highScore) highScore = score;
        gameState = STATES.LEVEL_COMPLETE;
        levelCompleteTimer = 0;
      } else {
        gameState = STATES.LEVEL_COMPLETE;
        levelCompleteTimer = 0;
      }
    } else {
      // Next wave
      setTimeout(() => {
        if (gameState === STATES.PLAYING) spawnWave();
      }, 1500);
      waveMessage = `WAVE ${currentWave + 1} / ${ld.waves}`;
      waveMessageTimer = 1.5;
    }
  }
}

// =============================================================================
// UI / HUD RENDERER
// =============================================================================
function drawGrid() {
  ctx.strokeStyle = COLORS.GRID;
  ctx.lineWidth = 1;
  const step = 40;
  for (let x = 0; x <= CANVAS_W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let y = 0; y < CANVAS_H; y += 4) {
    ctx.fillRect(0, y, CANVAS_W, 2);
  }
}

function drawHUD() {
  // Top bar bg
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CANVAS_W, 36);

  // Level + wave
  ctx.fillStyle = COLORS.CYAN;
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText(`LEVEL ${currentLevel + 1}  WAVE ${currentWave + 1}/${LEVELS[currentLevel].waves}`, 12, 22);

  // Score
  ctx.fillStyle = COLORS.WHITE;
  ctx.font = 'bold 20px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(String(score).padStart(8, '0'), CANVAS_W / 2, 24);

  // Health hearts
  for (let i = 0; i < player.maxHp; i++) {
    drawHeart(CANVAS_W - 30 - i * 28, 18, i < player.hp);
  }

  // Wave message
  if (waveMessageTimer > 0) {
    const alpha = Math.min(1, waveMessageTimer);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COLORS.YELLOW;
    ctx.font = 'bold 28px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(waveMessage, CANVAS_W / 2, CANVAS_H / 2 - 20);
    ctx.globalAlpha = 1;
  }
}

function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? COLORS.HEART : '#442233';
  // Pixel heart shape
  const px = [
    [1,0],[2,0],[4,0],[5,0],
    [0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
    [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],
    [1,3],[2,3],[3,3],[4,3],[5,3],
    [2,4],[3,4],[4,4],
    [3,5],
  ];
  const ox = x - 3, oy = y - 3;
  for (const [px2, py2] of px) {
    ctx.fillRect(ox + px2 * 2, oy + py2 * 2, 2, 2);
  }
}

function drawCrosshair() {
  const cx = Math.round(mouse.x), cy = Math.round(mouse.y);
  ctx.strokeStyle = COLORS.CYAN;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 12, cy); ctx.lineTo(cx - 4, cy);
  ctx.moveTo(cx + 4, cy);  ctx.lineTo(cx + 12, cy);
  ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy - 4);
  ctx.moveTo(cx, cy + 4);  ctx.lineTo(cx, cy + 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.stroke();
}

// Menu preview enemies
const menuEnemies = [];
for (let i = 0; i < 5; i++) {
  menuEnemies.push({
    x: rand(50, CANVAS_W - 50),
    y: rand(200, CANVAS_H - 100),
    type: ['GRUNT','RUNNER','TANK','SHOOTER'][randInt(0, 3)],
    vx: rand(-30, 30),
    vy: rand(-30, 30),
    anim: rand(0, Math.PI * 2),
  });
}

function drawMenuScreen(dt) {
  ctx.fillStyle = COLORS.BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  drawGrid();

  // Animate preview enemies
  for (const me of menuEnemies) {
    me.x += me.vx * dt;
    me.y += me.vy * dt;
    me.anim += dt;
    if (me.x < 0 || me.x > CANVAS_W) me.vx *= -1;
    if (me.y < 200 || me.y > CANVAS_H - 50) me.vy *= -1;
    const cfg = ENEMY_TYPES[me.type];
    const s = cfg.size;
    ctx.fillStyle = cfg.color;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(Math.round(me.x - s/2), Math.round(me.y - s/2), s, s);
    ctx.globalAlpha = 1;
  }

  // Title glow
  ctx.save();
  ctx.shadowColor = COLORS.CYAN;
  ctx.shadowBlur = 30;
  ctx.fillStyle = COLORS.CYAN;
  ctx.font = 'bold 72px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('TOP GUN', CANVAS_W / 2, 120);
  ctx.restore();

  ctx.fillStyle = COLORS.WHITE;
  ctx.font = 'bold 16px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('TOP-DOWN SHOOTER', CANVAS_W / 2, 155);

  // High score
  ctx.fillStyle = COLORS.YELLOW;
  ctx.font = 'bold 14px "Courier New"';
  ctx.fillText(`HIGH SCORE: ${String(highScore).padStart(8, '0')}`, CANVAS_W / 2, 185);

  // Play button
  drawButton(CANVAS_W / 2 - 80, 220, 160, 42, '[ PLAY ]', COLORS.GREEN, COLORS.BG, menuHover(CANVAS_W/2-80, 220, 160, 42));

  // Controls
  ctx.fillStyle = COLORS.GREY;
  ctx.font = '13px "Courier New"';
  ctx.fillText('ARROW KEYS / WASD: Move', CANVAS_W / 2, 310);
  ctx.fillText('MOUSE: Aim  |  CLICK: Shoot', CANVAS_W / 2, 330);
  ctx.fillText('Survive all waves to advance levels', CANVAS_W / 2, 355);

  // Enemy legend
  ctx.fillStyle = COLORS.GREY;
  ctx.font = '12px "Courier New"';
  ctx.fillText('ENEMIES', CANVAS_W / 2, 395);
  const typeNames = Object.keys(ENEMY_TYPES);
  typeNames.forEach((t, i) => {
    const cfg = ENEMY_TYPES[t];
    const tx = CANVAS_W / 2 - 150 + i * 90;
    ctx.fillStyle = cfg.color;
    ctx.fillRect(tx - 6, 408, 12, 12);
    ctx.fillStyle = COLORS.GREY;
    ctx.fillText(cfg.label, tx + 10, 419);
  });

  drawScanlines();
}

function menuHover(bx, by, bw, bh) {
  return mouse.x >= bx && mouse.x <= bx + bw && mouse.y >= by && mouse.y <= by + bh;
}

function drawButton(bx, by, bw, bh, label, color, bg, hovered) {
  ctx.fillStyle = hovered ? color : bg;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = hovered ? bg : color;
  ctx.font = 'bold 18px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(label, bx + bw / 2, by + bh / 2 + 6);
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const isLastLevel = currentLevel >= LEVELS.length - 1;

  ctx.save();
  ctx.shadowColor = COLORS.GREEN;
  ctx.shadowBlur = 20;
  ctx.fillStyle = COLORS.GREEN;
  ctx.font = 'bold 48px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(isLastLevel ? 'YOU WIN!' : 'LEVEL COMPLETE', CANVAS_W / 2, 200);
  ctx.restore();

  ctx.fillStyle = COLORS.WHITE;
  ctx.font = 'bold 20px "Courier New"';
  ctx.fillText(`SCORE: ${String(score).padStart(8, '0')}`, CANVAS_W / 2, 260);
  ctx.fillStyle = COLORS.CYAN;
  ctx.fillText(`ENEMIES KILLED: ${enemiesKilled}`, CANVAS_W / 2, 295);

  if (isLastLevel) {
    ctx.fillStyle = COLORS.YELLOW;
    ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('CONGRATULATIONS - ALL LEVELS CLEARED!', CANVAS_W / 2, 340);
    drawButton(CANVAS_W/2 - 80, 380, 160, 42, '[ MENU ]', COLORS.CYAN, COLORS.BG, menuHover(CANVAS_W/2-80, 380, 160, 42));
  } else {
    drawButton(CANVAS_W/2 - 100, 360, 200, 42, '[ NEXT LEVEL ]', COLORS.GREEN, COLORS.BG, menuHover(CANVAS_W/2-100, 360, 200, 42));
  }

  drawScanlines();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.shadowColor = COLORS.RED;
  ctx.shadowBlur = 25;
  ctx.fillStyle = COLORS.RED;
  ctx.font = 'bold 56px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CANVAS_W / 2, 200);
  ctx.restore();

  ctx.fillStyle = COLORS.WHITE;
  ctx.font = 'bold 20px "Courier New"';
  ctx.fillText(`SCORE: ${String(score).padStart(8, '0')}`, CANVAS_W / 2, 265);
  ctx.fillStyle = COLORS.GREY;
  ctx.fillText(`HIGH SCORE: ${String(highScore).padStart(8, '0')}`, CANVAS_W / 2, 298);
  ctx.fillStyle = COLORS.CYAN;
  ctx.fillText(`ENEMIES KILLED: ${enemiesKilled}`, CANVAS_W / 2, 330);

  drawButton(CANVAS_W/2 - 170, 370, 150, 42, '[ RETRY ]', COLORS.GREEN, COLORS.BG, menuHover(CANVAS_W/2-170, 370, 150, 42));
  drawButton(CANVAS_W/2 + 20,  370, 150, 42, '[ MENU ]',  COLORS.CYAN,  COLORS.BG, menuHover(CANVAS_W/2+20, 370, 150, 42));

  drawScanlines();
}

// =============================================================================
// CLICK HANDLING
// =============================================================================
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / r.width;
  const scaleY = CANVAS_H / r.height;
  const cx = (e.clientX - r.left) * scaleX;
  const cy = (e.clientY - r.top) * scaleY;

  if (gameState === STATES.MENU) {
    if (cx >= CANVAS_W/2-80 && cx <= CANVAS_W/2+80 && cy >= 220 && cy <= 262) {
      startGame();
    }
  } else if (gameState === STATES.LEVEL_COMPLETE) {
    const isLastLevel = currentLevel >= LEVELS.length - 1;
    if (isLastLevel) {
      if (cx >= CANVAS_W/2-80 && cx <= CANVAS_W/2+80 && cy >= 380 && cy <= 422) {
        gameState = STATES.MENU;
      }
    } else {
      if (cx >= CANVAS_W/2-100 && cx <= CANVAS_W/2+100 && cy >= 360 && cy <= 402) {
        nextLevel();
      }
    }
  } else if (gameState === STATES.GAME_OVER) {
    if (cx >= CANVAS_W/2-170 && cx <= CANVAS_W/2-20 && cy >= 370 && cy <= 412) {
      startGame();
    }
    if (cx >= CANVAS_W/2+20 && cx <= CANVAS_W/2+170 && cy >= 370 && cy <= 412) {
      gameState = STATES.MENU;
    }
  }
});

function nextLevel() {
  currentLevel++;
  currentWave = 0;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  player.hp = Math.min(player.maxHp, player.hp + 1); // restore 1 hp
  gameState = STATES.PLAYING;
  spawnWave();
}

// =============================================================================
// GAME LOOP
// =============================================================================
function update(dt) {
  if (gameState !== STATES.PLAYING) return;

  waveMessageTimer = Math.max(0, waveMessageTimer - dt);

  player.update(dt);
  mouse.clicked = false;

  // Update enemies
  for (const e of enemies) {
    e.update(dt, player.x, player.y);
  }

  // Update player bullets
  for (const b of bullets) b.update(dt);
  bullets = bullets.filter(b => !b.dead);

  // Update enemy bullets
  for (const b of enemyBullets) b.update(dt);
  enemyBullets = enemyBullets.filter(b => !b.dead);

  // Update particles
  for (const p of particles) p.update(dt);
  particles = particles.filter(p => !p.isDead());

  // Bullet vs enemy collision
  for (const b of bullets) {
    for (const e of enemies) {
      if (!e.dead && dist(b.x, b.y, e.x, e.y) < e.size) {
        b.dead = true;
        e.takeDamage(1);
        break;
      }
    }
  }
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);

  // Enemy vs player collision
  for (const e of enemies) {
    if (dist(e.x, e.y, player.x, player.y) < e.size + player.radius - 4) {
      player.takeDamage();
    }
  }

  // Enemy bullet vs player
  for (const b of enemyBullets) {
    if (dist(b.x, b.y, player.x, player.y) < player.radius) {
      b.dead = true;
      player.takeDamage();
    }
  }
  enemyBullets = enemyBullets.filter(b => !b.dead);

  // Death check
  if (player.hp <= 0) {
    if (score > highScore) highScore = score;
    spawnParticles(player.x, player.y, COLORS.CYAN, 10);
    gameState = STATES.GAME_OVER;
    return;
  }

  // Wave check
  checkWaveComplete();

  // Screen effects decay
  screenShake = Math.max(0, screenShake - dt * 2);
  screenFlash = Math.max(0, screenFlash - dt * 3);
}

function render(dt) {
  // Screen shake
  ctx.save();
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake * 12;
    const sy = (Math.random() - 0.5) * screenShake * 12;
    ctx.translate(sx, sy);
  }

  ctx.fillStyle = COLORS.BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  drawGrid();

  if (gameState === STATES.PLAYING) {
    // Render particles
    for (const p of particles) p.draw();

    // Render enemies
    for (const e of enemies) e.draw();

    // Render bullets
    for (const b of bullets) b.draw();
    for (const b of enemyBullets) b.draw();

    // Render player
    player.draw();

    // Screen flash (red tint on hit)
    if (screenFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${screenFlash * 0.35})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    drawHUD();
    drawCrosshair();
    drawScanlines();
  } else if (gameState === STATES.MENU) {
    ctx.restore();
    drawMenuScreen(dt);
    return;
  } else if (gameState === STATES.LEVEL_COMPLETE) {
    // Still show the play field dimmed
    for (const p of particles) p.draw();
    ctx.restore();
    drawLevelComplete();
    return;
  } else if (gameState === STATES.GAME_OVER) {
    for (const p of particles) p.draw();
    ctx.restore();
    drawGameOver();
    return;
  }

  ctx.restore();
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render(dt);

  requestAnimationFrame(gameLoop);
}

// Resize canvas to fit window while maintaining aspect ratio
function resizeCanvas() {
  const windowRatio = window.innerWidth / window.innerHeight;
  const gameRatio = CANVAS_W / CANVAS_H;
  let w, h;
  if (windowRatio > gameRatio) {
    h = Math.min(window.innerHeight, CANVAS_H * 1.5);
    w = h * gameRatio;
  } else {
    w = Math.min(window.innerWidth, CANVAS_W * 1.5);
    h = w / gameRatio;
  }
  canvas.style.width  = `${w}px`;
  canvas.style.height = `${h}px`;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Kick off
requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });
</script>
</body>
