<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    #reset:hover {
      background: #e94560;
      color: #fff;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { font-weight: bold; }
    #score .label-x { color: #e94560; }
    #score .label-o { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div>X <span class="label-x" id="score-x">0</span></div>
    <div>Draws <span id="score-d">0</span></div>
    <div>O <span class="label-o" id="score-o">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      scores = { X: 0, O: 0, D: 0 };
      newGame();
    }

    function newGame() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      document.getElementById('status').textContent = "X's turn";
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = +cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        gameOver = true;
        win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        document.getElementById('status').textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
      } else if (board.every(Boolean)) {
        gameOver = true;
        document.getElementById('status').textContent = "It's a draw!";
        scores.D++;
        updateScore();
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = `${current}'s turn`;
      }
    });

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', newGame);

    init();
  </script>
</body>
</html>
